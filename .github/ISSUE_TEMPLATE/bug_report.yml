name: Bug report
description: 报告可复现的问题
body:
  - type: input
    id: system
    attributes: { label: 系统版本 }
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: DayMate 版本 }
    validations: { required: true }
  - type: textarea
    id: description
    attributes: { label: 问题描述与复现步骤 }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: 预期行为与实际行为 }
  - type: textarea
    id: logs
    attributes: { label: 日志或截图, description: 提交前请移除用户名、路径、窗口标题和其他隐私信息。 }
