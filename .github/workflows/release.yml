name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: npm ci
      - run: npm run version:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DayMate ${{ github.ref_name }}"
          releaseBody: |
            ## DayMate 0.3.1

            - 修复重复双击桌面图标会打开多个 DayMate 窗口和多个浮动球的问题。
            - DayMate 现在只允许一个运行实例；再次启动只会唤醒现有主窗口。
            - 从桌面图标或托盘唤醒时自动隐藏浮动球，并恢复、置前主窗口。
            - 浮动球增加防重复点击保护，降低电脑卡顿时的重复操作风险。

            数据库迁移：无。

            下载 `setup.exe` 后直接安装，普通用户不需要 Node.js 或 Rust。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
      - name: Upload SHA256 checksum
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content SHA256SUMS.txt -Encoding ascii
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
