name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: npm ci
      - run: npm run version:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DayMate ${{ github.ref_name }}"
          releaseBody: |
            ## DayMate 0.1.1

            - 新增可拖动的桌面浮动球，点击即可恢复主窗口。
            - 新增桌面浮动球设置开关和“收起为浮球”快捷操作。
            - 更新 DayMate 正式品牌图标，并用于程序、托盘和安装包。
            - README 新增真实应用截图。

            数据库迁移：无。

            下载 `setup.exe` 后直接安装，普通用户不需要 Node.js 或 Rust。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
