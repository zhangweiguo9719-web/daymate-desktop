name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: npm ci
      - run: npm run version:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DayMate ${{ github.ref_name }}"
          releaseBody: |
            ## DayMate 0.3.0

            - 音乐播放器新增随机推荐、自动连播和单曲循环。
            - 音乐播放时，桌面浮动球显示实时律动状态。
            - 时间回顾新增鼠标点击、键盘按键和最近输入时间；亮屏但无键鼠输入不再误判为活跃。
            - 托盘与浮动球新增原生右键菜单，可正常显示、隐藏或退出 DayMate。
            - 修复鼠标经过托盘图标时主窗口意外弹出的问题。

            数据库迁移：活动会话升级到 v2，新增键鼠次数汇总字段，不保存输入内容和鼠标位置。

            下载 `setup.exe` 后直接安装，普通用户不需要 Node.js 或 Rust。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
      - name: Upload SHA256 checksum
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content SHA256SUMS.txt -Encoding ascii
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
