name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: npm ci
      - run: npm run version:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DayMate ${{ github.ref_name }}"
          releaseBody: |
            ## DayMate 0.3.2

            - 修复没有敲击键盘时，键盘次数仍持续自动增加的问题。
            - 键鼠计数改为只记录真实的“未按下 → 按下”变化。
            - 避免 Shift、Ctrl、Alt 通用键与左右修饰键重复计数。
            - 修复 `VK_CANCEL` 被错误归类为鼠标点击的问题。

            数据库迁移：升级到 v3，自动清除旧版本产生的不可靠键盘次数；应用时长、任务和鼠标历史保持不变。

            下载 `setup.exe` 后直接安装，普通用户不需要 Node.js 或 Rust。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
      - name: Upload SHA256 checksum
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content SHA256SUMS.txt -Encoding ascii
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --clobber
